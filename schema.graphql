"""
Global stats and configuration for the OneMEME Launchpad.
Singleton entity — id is always Bytes.fromUTF8("factory").
"""
type Factory @entity {
  id: Bytes!

  " Total tokens ever created "
  totalTokensCreated: BigInt!
  totalStandardTokens: BigInt!
  totalTaxTokens: BigInt!
  totalReflectionTokens: BigInt!
  totalUnknownTokens: BigInt!

  " Aggregate trade counts "
  totalBuys: BigInt!
  totalSells: BigInt!
  totalMigrations: BigInt!

  " Current factory settings "
  creationFee: BigInt!
  owner: Bytes!
  " Pending owner from two-step ownership transfer; null until proposed "
  pendingOwner: Bytes
  platformFeeBps: BigInt!
  charityFeeBps: BigInt!
  " Platform fee recipient wallet (set by FeeRecipientUpdated) "
  feeRecipient: Bytes
  " Charity wallet address (set by CharityWalletUpdated) "
  charityWallet: Bytes
  " PancakeSwap V2 router address (set by RouterUpdated) "
  router: Bytes
  " CreatorVault address (set by CreatorVaultUpdated events) "
  creatorVault: Bytes

  " Allocation bounds — updated via AllocationBoundsUpdated "
  minCurveBps: BigInt
  minLiquidityBps: BigInt
  maxCreatorBps: BigInt
  " Token supply bounds — updated via SupplyBoundsUpdated "
  minSupply: BigInt
  maxSupply: BigInt
  " Latest token implementation — updated via ImplUpdated "
  latestImplType: String
  latestImpl: Bytes

  timelockActions: [TimelockAction!]! @derivedFrom(field: "factory")
}

"""
A timelocked governance action queued on the factory.
"""
type TimelockAction @entity {
  " bytes32 actionId — also serves as the entity id "
  id: Bytes!
  factory: Factory!
  executeAfter: BigInt!
  executed: Boolean!
  cancelled: Boolean!
  queuedAtTimestamp: BigInt!
  queuedAtBlockNumber: BigInt!
  queuedTxHash: Bytes!
  executedTxHash: Bytes
  cancelledTxHash: Bytes
}

"""
A token launched through the OneMEME Launchpad.
"""
type Token @entity {
  " Token contract address "
  id: Bytes!
  creator: Bytes!

  " ERC-20 metadata (fetched via contract call at creation) "
  name: String
  symbol: String
  totalSupply: BigInt!

  " STANDARD | TAX | REFLECTION | UNKNOWN "
  tokenType: String!

  " Bonding-curve parameters (locked at creation) "
  virtualBNB: BigInt!
  migrationTarget: BigInt!
  antibotEnabled: Boolean!
  tradingBlock: BigInt!

  " Current bonding-curve state "
  raisedBNB: BigInt!
  " Tokens currently held by the bonding curve (decreases on buys, increases on sells) "
  bcTokensPool: BigInt!
  migrated: Boolean!

  " Set after migration "
  pair: Bytes
  migrationBNB: BigInt
  migrationLiquidityTokens: BigInt
  migratedAtTimestamp: BigInt
  migratedAtBlockNumber: BigInt

  " Set if migration tx reverted (tokens returned to the bonding curve) "
  migrationFailed: Boolean!
  " Set when admin calls emergencyMigrate() — LP forcefully moved and tokens returned "
  emergencyMigrated: Boolean!
  emergencyMigrationTo: Bytes
  emergencyMigrationBnb: BigInt
  emergencyMigrationTokenAmount: BigInt
  emergencyMigratedAtTimestamp: BigInt
  emergencyMigratedAtBlockNumber: BigInt

  " Aggregate trade stats "
  buysCount: BigInt!
  sellsCount: BigInt!
  totalVolumeBNBBuy: BigInt!
  totalVolumeBNBSell: BigInt!

  " Last known spot price (wei, scaled ×1e18) — kept in sync on every trade for open-price seeding "
  lastKnownPrice: BigInt!

  " Creation metadata "
  createdAtTimestamp: BigInt!
  createdAtBlockNumber: BigInt!
  txHash: Bytes!

  " Raw IPFS URI from contract "
  metaUri: String

  " Resolved from IPFS metadata JSON "
  description: String
  image: String
  website: String
  twitter: String
  telegram: String

  trades:                [Trade!]!                  @derivedFrom(field: "token")
  migrations:            [Migration!]!              @derivedFrom(field: "token")
  vestingSchedules:      [VestingSchedule!]!        @derivedFrom(field: "token")
  creatorVaultPositions: [CreatorVaultPosition!]!   @derivedFrom(field: "token")
  snapshots:             [TokenSnapshot!]!          @derivedFrom(field: "token")
  holders:               [Holder!]!                 @derivedFrom(field: "token")
}

"""
A single buy or sell on the bonding curve.
"""
type Trade @entity {
  " txHash + logIndex "
  id: Bytes!
  token: Token!
  trader: Bytes!

  " BUY | SELL "
  type: String!

  " For BUY: BNB paid (gross, before fee). For SELL: BNB received (net, after fee). "
  bnbAmount: BigInt!

  " Tokens transferred to the trader (gross; does not subtract tokensToDead) "
  tokenAmount: BigInt!

  " Tokens sent to dead wallet by antibot penalty (0 for sells) "
  tokensToDead: BigInt!

  " raisedBNB pool value after this trade "
  raisedBNBAfter: BigInt!

  timestamp: BigInt!
  blockNumber: BigInt!
  txHash: Bytes!
}

"""
A migration to PancakeSwap V2 liquidity pool.
"""
type Migration @entity {
  " txHash + logIndex "
  id: Bytes!
  token: Token!
  pair: Bytes!
  liquidityBNB: BigInt!
  liquidityTokens: BigInt!
  timestamp: BigInt!
  blockNumber: BigInt!
  txHash: Bytes!
}

"""
A creator vesting schedule (one per token per beneficiary).
"""
type VestingSchedule @entity {
  " token address + beneficiary address (concatenated) "
  id: Bytes!
  token: Token!
  beneficiary: Bytes!
  amount: BigInt!
  claimed: BigInt!
  " Vesting duration in seconds (set by new CreatorVault; 0 for legacy VestingWallet schedules) "
  duration: BigInt!
  voided: Boolean!
  burnedOnVoid: BigInt
  voidedTxHash: Bytes

  createdAtTimestamp: BigInt!
  createdAtBlockNumber: BigInt!
  txHash: Bytes!

  claims: [VestingClaim!]! @derivedFrom(field: "schedule")
}

"""
A V3 LP position locked in CreatorVault for a StandardToken migration.
id = token contract address (one position per token).
"""
type CreatorVaultPosition @entity {
  " Token contract address "
  id: Bytes!
  token: Token!
  tokenId: BigInt!
  feeWallet: Bytes!
  pool: Bytes!
  positionManager: Bytes!

  " Cumulative fees distributed across all claimFees calls "
  totalCreatorFees0: BigInt!
  totalCreatorFees1: BigInt!
  totalPlatformFees0: BigInt!
  totalPlatformFees1: BigInt!
  totalCharityFees0: BigInt!
  totalCharityFees1: BigInt!
  claimCount: BigInt!

  registeredAtTimestamp: BigInt!
  registeredAtBlockNumber: BigInt!
  registeredTxHash: Bytes!

  feeClaims: [CreatorVaultFeeClaim!]! @derivedFrom(field: "position")
}

"""
A single LP swap-fee claim on CreatorVault (StandardToken migrations).
"""
type CreatorVaultFeeClaim @entity {
  " txHash + logIndex "
  id: Bytes!
  position: CreatorVaultPosition!
  token: Token!
  feeWallet: Bytes!
  creator0: BigInt!
  creator1: BigInt!
  platform0: BigInt!
  platform1: BigInt!
  charity0: BigInt!
  charity1: BigInt!
  timestamp: BigInt!
  blockNumber: BigInt!
  txHash: Bytes!
}

"""
A single vesting claim by a beneficiary.
"""
type VestingClaim @entity {
  " txHash + logIndex "
  id: Bytes!
  schedule: VestingSchedule!
  amount: BigInt!
  timestamp: BigInt!
  blockNumber: BigInt!
  txHash: Bytes!
}

"""
Mutable configuration state of the CreatorVault contract (singleton per vault).
"""
type CreatorVaultState @entity {
  " CreatorVault contract address "
  id: Bytes!
  owner: Bytes
  launchManager: Bytes
  platformWallet: Bytes
  charityWallet: Bytes
  creatorBps: BigInt
  platformBps: BigInt
  charityBps: BigInt
}

"""
Time-bucketed stats per token — used for trending and leaderboards across five windows.
period: 5m | 45m | 1h | 1d | 7d. One entity per (token, period, bucket).
id = tokenAddress + Bytes.fromUTF8(period) + concatI32(bucketId).
"""
type TokenPeriodStats @entity {
  id: Bytes!
  token: Token!
  " 5m | 45m | 1h | 1d | 7d "
  period: String!
  " timestamp / duration "
  bucketId: BigInt!
  " start-of-bucket unix timestamp "
  periodStart: BigInt!
  buyVolumeBNB: BigInt!
  sellVolumeBNB: BigInt!
  volumeBNB: BigInt!
  buysCount: BigInt!
  sellsCount: BigInt!
  openRaisedBNB: BigInt!
  closeRaisedBNB: BigInt!
  " Spot price (wei, scaled ×1e18) = (virtualBNB + raisedBNB) × 1e18 / bcTokensPool "
  openPrice: BigInt!
  highPrice: BigInt!
  lowPrice: BigInt!
  closePrice: BigInt!
}

"""
Per-block OHLCV snapshot for TradingView charts.
openRaisedBNB / closeRaisedBNB approximate open/close price via pool depth.
"""
type TokenSnapshot @entity {
  " tokenAddress.concatI32(blockNumber) — 24-byte concatenated Bytes "
  id: Bytes!
  token: Token!
  blockNumber: BigInt!
  timestamp: BigInt!
  openRaisedBNB: BigInt!
  closeRaisedBNB: BigInt!
  " Spot price (wei, scaled ×1e18) = (virtualBNB + raisedBNB) × 1e18 / bcTokensPool "
  openPrice: BigInt!
  highPrice: BigInt!
  lowPrice: BigInt!
  closePrice: BigInt!
  volumeBNB: BigInt!
  buyCount: Int!
  sellCount: Int!
}

"""
ERC-20 holder balance for a token, updated via Transfer events.
Only tracked while the token is in the bonding-curve phase (migrated = false).
"""
type Holder @entity {
  " token address + holder address (concatenated) "
  id: Bytes!
  token: Token!
  address: Bytes!
  balance: BigInt!
  lastUpdatedBlock: BigInt!
  lastUpdatedTimestamp: BigInt!
}

# ─── Spark ───────────────────────────────────────────────────────────────────

"""
SparkLocker configuration state (singleton per deployed contract).
Initialised on the first event via contract calls; updated by governance events.
"""
type SparkLockerState @entity {
  " Locker contract address "
  id: Bytes!
  owner: Bytes!
  launcher: Bytes
  platformWallet: Bytes!
  charityWallet: Bytes!
  creatorBps: BigInt!
  platformBps: BigInt!
  charityBps: BigInt!
}

"""
A V3-compatible DEX registered on SparkLauncher (factory → positionManager + router).
"""
type SparkDex @entity {
  " V3 factory address "
  id: Bytes!
  positionManager: Bytes!
  router: Bytes!
  enabled: Boolean!
  addedAtTimestamp: BigInt!
  addedAtBlockNumber: BigInt!
}

"""
Global state for SparkLauncher (singleton per deployed contract).
"""
type SparkLauncherState @entity {
  " Launcher contract address "
  id: Bytes!
  " Global launch fee in native ETH/BNB (applies to all quote tokens) "
  launchFee: BigInt!
  " Platform wallet that receives the launch fee "
  launchFeeWallet: Bytes!
  " Cumulative native ETH rescued by admin via rescueETH() "
  totalETHRescued: BigInt!
  " Cumulative number of ERC-20 rescue calls by admin "
  totalERC20Rescued: BigInt!
}

"""
A quote token accepted by SparkLauncher (pool pairing partner + price reference).
"""
type SparkQuoteToken @entity {
  " Quote token contract address "
  id: Bytes!
  enabled: Boolean!
  " True when the quote token is WETH (native BNB wrapper) "
  isNative: Boolean!
  " Reference market cap (raw units) targeting the desired launch price "
  marketCapRef: BigInt!
  " Fee tier of the existing WETH/quoteToken pool used for multihop instant-buy routing; 0 for WETH itself "
  wethPairFee: Int!
}

"""
A token launched through SparkLauncher.
Ownerless ERC-20; full-range V3 LP is permanently locked in SparkLocker.
"""
type SparkLaunchedToken @entity {
  " Deployed token contract address "
  id: Bytes!
  name: String
  symbol: String
  metaURI: String
  creator: Bytes!
  " V3 factory used at launch "
  factory: Bytes!
  " Position manager for the LP NFT "
  positionManager: Bytes!
  quoteToken: Bytes!
  feeWallet: Bytes!
  pool: Bytes!
  " Uniswap V3 pair composition (lower address = token0, higher = token1) "
  token0: Bytes!
  token1: Bytes!
  " LP NFT id held by SparkLocker "
  tokenId: BigInt!
  " True if the LP NFT was emergency-withdrawn by the locker owner "
  lpWithdrawn: Boolean!

  " Cumulative fees distributed across all claimFees calls "
  totalCreatorFees0: BigInt!
  totalCreatorFees1: BigInt!
  totalPlatformFees0: BigInt!
  totalPlatformFees1: BigInt!
  totalCharityFees0: BigInt!
  totalCharityFees1: BigInt!
  claimCount: BigInt!

  " Cumulative trade counts and volume "
  tradeCount: BigInt!
  totalVolumeToken: BigInt!
  totalVolumeQuote: BigInt!

  createdAtTimestamp: BigInt!
  createdAtBlockNumber: BigInt!
  txHash: Bytes!

  feeClaims: [SparkFeeClaim!]! @derivedFrom(field: "token")
  trades:    [SparkTrade!]!    @derivedFrom(field: "token")
  holders:   [SparkHolder!]!  @derivedFrom(field: "token")
}

"""
A token holder for a Spark-launched token.
id = token address + holder address (concatenated bytes).
"""
type SparkHolder @entity {
  id: Bytes!
  token: SparkLaunchedToken!
  address: Bytes!
  balance: BigInt!
  lastUpdatedBlock: BigInt!
  lastUpdatedTimestamp: BigInt!
}

"""
Lookup table: Uniswap V3 pool address → SparkLaunchedToken.
Created when a token is launched so the Swap handler can resolve the token.
"""
type SparkPool @entity {
  " Pool contract address "
  id: Bytes!
  token: SparkLaunchedToken!
  " True if the Spark token is token0 in the V3 pool "
  sparkIsToken0: Boolean!
}

"""
A single swap (buy or sell) on a Spark token's Uniswap V3 pool.
"""
type SparkTrade @entity {
  " txHash + logIndex "
  id: Bytes!
  token: SparkLaunchedToken!
  pool: Bytes!
  sender: Bytes!
  recipient: Bytes!
  " Raw signed amounts from the Swap event (negative = leaving pool) "
  amount0: BigInt!
  amount1: BigInt!
  sqrtPriceX96: BigInt!
  liquidity: BigInt!
  tick: Int!
  " True = user bought Spark token, False = user sold Spark token "
  isBuy: Boolean!
  " Absolute spark token amount involved "
  sparkAmount: BigInt!
  " Absolute quote token amount involved "
  quoteAmount: BigInt!
  timestamp: BigInt!
  blockNumber: BigInt!
  txHash: Bytes!
}

"""
A single LP swap-fee claim on SparkLocker.
"""
type SparkFeeClaim @entity {
  " txHash + logIndex "
  id: Bytes!
  token: SparkLaunchedToken!
  feeWallet: Bytes!
  creator0: BigInt!
  creator1: BigInt!
  platform0: BigInt!
  platform1: BigInt!
  charity0: BigInt!
  charity1: BigInt!
  timestamp: BigInt!
  blockNumber: BigInt!
  txHash: Bytes!
}

# ─── Locker ──────────────────────────────────────────────────────────────────

"""
1CoinLocker contract state (one entity per deployed contract address).
"""
type Locker @entity {
  " Contract address "
  id: Bytes!
  " All-time number of locks ever created "
  totalLocks: BigInt!
  " Locks not yet fully withdrawn or renounced "
  activeLocks: BigInt!
  " Current static fallback fee (wei) — updated via FeeUpdated "
  fee: BigInt!
  " Cumulative native fees swept by the owner via collectFees() "
  totalFeesCollected: BigInt!
  locks: [Lock!]! @derivedFrom(field: "locker")
}

"""
An individual token lock on the 1CoinLocker.
"""
type Lock @entity {
  " locker address + lockId (concatI32) "
  id: Bytes!
  locker: Locker!
  lockId: BigInt!

  " address(0) / null when renounced "
  owner: Bytes
  token: Bytes!

  " Actual tokens received after any transfer fee "
  amount: BigInt!
  withdrawn: BigInt!

  lockDate: BigInt!
  " 0 for Cliff locks; vesting start for Linear locks "
  startTime: BigInt!
  endTime: BigInt!

  " Cliff | Linear "
  lockType: String!
  isLP: Boolean!
  description: String!
  renounced: Boolean!

  createdAtTimestamp: BigInt!
  createdAtBlockNumber: BigInt!
  txHash: Bytes!

  withdrawals: [LockWithdrawal!]! @derivedFrom(field: "lock")
  transfers:   [LockTransfer!]!   @derivedFrom(field: "lock")
  activities:  [LockActivity!]!   @derivedFrom(field: "lock")
}

"""
A single withdrawal from a Lock.
"""
type LockWithdrawal @entity {
  " txHash + logIndex "
  id: Bytes!
  lock: Lock!
  owner: Bytes!
  amount: BigInt!
  nativeFee: BigInt!
  timestamp: BigInt!
  blockNumber: BigInt!
  txHash: Bytes!
}

"""
A lock ownership transfer.
"""
type LockTransfer @entity {
  " txHash + logIndex "
  id: Bytes!
  lock: Lock!
  from: Bytes!
  to: Bytes!
  timestamp: BigInt!
  blockNumber: BigInt!
  txHash: Bytes!
}

"""
Unified activity log for a Lock — one entry per event regardless of type.
Enables a single query to reconstruct the full lifecycle of any lock.
"""
type LockActivity @entity {
  " txHash + logIndex "
  id: Bytes!
  lock: Lock!
  " CREATED | EDITED | EXTENDED | DESCRIPTION_CHANGED | WITHDRAWN | TRANSFERRED | RENOUNCED "
  action: String!
  timestamp: BigInt!
  blockNumber: BigInt!
  txHash: Bytes!

  " EDITED: new total amount after edit "
  newAmount: BigInt
  " EDITED | EXTENDED: new unlock timestamp "
  newEndTime: BigInt
  " DESCRIPTION_CHANGED: updated description text "
  description: String
  " WITHDRAWN: tokens removed in this withdrawal "
  withdrawnAmount: BigInt
  " WITHDRAWN: native fee paid "
  nativeFee: BigInt
  " TRANSFERRED: previous owner "
  from: Bytes
  " TRANSFERRED: new owner "
  to: Bytes
}
