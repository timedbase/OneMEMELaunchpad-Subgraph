specVersion: 1.0.0
description: OneMEME Launchpad subgraph — core + peripheral contracts on BNB Smart Chain
repository: https://github.com/timedbase/OneMEMELaunchpad-Subgraph
features:
  - ipfsOnEthereumContracts

indexerHints:
  prune: auto

schema:
  file: ./schema.graphql

dataSources:
  # ─── Core Contracts ────────────────────────────────────────────────────────

  - kind: ethereum
    name: LaunchpadFactory
    network: bsc
    source:
      address: "0x0000000000000000000000000000000000000000" # TODO: replace with deployed LaunchpadFactory address
      abi: LaunchpadFactory
      startBlock: 0 # TODO: replace with the deployment block number
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.7
      language: wasm/assemblyscript
      entities:
        - Factory
        - Token
        - TimelockAction
      abis:
        - name: LaunchpadFactory
          file: ./abis/LaunchpadFactory.json
        - name: Token
          file: ./abis/Token.json
      eventHandlers:
        - event: TokenCreated(indexed address,indexed address,uint256,uint256,uint256,bool,uint256)
          handler: handleTokenCreated
        - event: DefaultParamsUpdated(uint256,uint256,uint256,uint256)
          handler: handleDefaultParamsUpdated
        - event: CreationFeeUpdated(uint256,uint256)
          handler: handleCreationFeeUpdated
        - event: OwnershipTransferred(indexed address,indexed address)
          handler: handleOwnershipTransferred
        - event: ManagerAdded(indexed address)
          handler: handleManagerAdded
        - event: ManagerRemoved(indexed address)
          handler: handleManagerRemoved
        - event: TimelockQueued(indexed bytes32,uint256)
          handler: handleTimelockQueued
        - event: TimelockExecuted(indexed bytes32)
          handler: handleTimelockExecuted
        - event: TimelockCancelled(indexed bytes32)
          handler: handleTimelockCancelled
      file: ./src/launchpadFactory.ts

  - kind: ethereum
    name: BondingCurve
    network: bsc
    source:
      address: "0x0000000000000000000000000000000000000000" # TODO: replace with deployed BondingCurve address
      abi: BondingCurve
      startBlock: 0 # TODO: replace with the deployment block number
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.7
      language: wasm/assemblyscript
      entities:
        - Token
        - Trade
        - Migration
        - Factory
        - TokenSnapshot
        - TokenPeriodStats
      abis:
        - name: BondingCurve
          file: ./abis/BondingCurve.json
      eventHandlers:
        - event: TokenBought(indexed address,indexed address,uint256,uint256,uint256,uint256)
          handler: handleTokenBought
        - event: TokenSold(indexed address,indexed address,uint256,uint256,uint256)
          handler: handleTokenSold
        - event: TokenMigrated(indexed address,indexed address,uint256,uint256)
          handler: handleTokenMigrated
        - event: FeesUpdated(uint256,uint256)
          handler: handleFeesUpdated
        - event: FeeRecipientUpdated(address)
          handler: handleFeeRecipientUpdated
        - event: CharityWalletUpdated(address)
          handler: handleCharityWalletUpdated
        - event: RouterUpdated(indexed address,indexed address)
          handler: handleRouterUpdated
      file: ./src/bondingCurve.ts

  - kind: ethereum
    name: VestingWallet
    network: bsc
    source:
      address: "0x0000000000000000000000000000000000000000" # TODO: replace with deployed VestingWallet address
      abi: VestingWallet
      startBlock: 0 # TODO: replace with the deployment block number
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.7
      language: wasm/assemblyscript
      entities:
        - VestingSchedule
        - VestingClaim
      abis:
        - name: VestingWallet
          file: ./abis/VestingWallet.json
      eventHandlers:
        - event: VestingAdded(indexed address,indexed address,uint256)
          handler: handleVestingAdded
        - event: Claimed(indexed address,indexed address,uint256)
          handler: handleClaimed
        - event: VestingVoided(indexed address,indexed address,uint256)
          handler: handleVestingVoided
      file: ./src/vestingWallet.ts

  # ─── Peripheral Contracts ──────────────────────────────────────────────────

  - kind: ethereum
    name: OneMEMEBB
    network: bsc
    source:
      address: "0x0000000000000000000000000000000000000000" # TODO: replace with deployed 1MEMEBB address
      abi: OneMEMEBB
      startBlock: 0 # TODO: replace with the deployment block number
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.7
      language: wasm/assemblyscript
      entities:
        - BuyBack
        - BuyBackEvent
      abis:
        - name: OneMEMEBB
          file: ./abis/peripheral/OneMEMEBB.json
      eventHandlers:
        - event: BoughtBack(uint256,uint256)
          handler: handleBoughtBack
        - event: RouterUpdated(indexed address)
          handler: handleRouterUpdated
        - event: BuyTokenUpdated(indexed address)
          handler: handleBuyTokenUpdated
        - event: CooldownUpdated(uint256)
          handler: handleCooldownUpdated
        - event: OwnershipTransferred(indexed address,indexed address)
          handler: handleOwnershipTransferred
      file: ./src/peripheral/oneMEMEBB.ts

  - kind: ethereum
    name: Collector
    network: bsc
    source:
      address: "0x0000000000000000000000000000000000000000" # TODO: replace with deployed Collector address
      abi: Collector
      startBlock: 0 # TODO: replace with the deployment block number
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.7
      language: wasm/assemblyscript
      entities:
        - Collector
        - DisperseEvent
      abis:
        - name: Collector
          file: ./abis/peripheral/Collector.json
      eventHandlers:
        - event: Dispersed(uint256)
          handler: handleDispersed
        - event: RecipientsUpdated(address,address,address,address,address,address)
          handler: handleRecipientsUpdated
        - event: OwnershipTransferred(indexed address,indexed address)
          handler: handleOwnershipTransferred
      file: ./src/peripheral/collector.ts

  - kind: ethereum
    name: Vault
    network: bsc
    source:
      address: "0x0000000000000000000000000000000000000000" # TODO: replace with deployed Vault address
      abi: Vault
      startBlock: 0 # TODO: replace with the deployment block number
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.7
      language: wasm/assemblyscript
      entities:
        - VaultContract
        - VaultProposal
      abis:
        - name: Vault
          file: ./abis/peripheral/Vault.json
      eventHandlers:
        - event: Proposed(indexed uint256,indexed address,address,uint256,bytes)
          handler: handleProposed
        - event: Confirmed(indexed uint256,indexed address)
          handler: handleConfirmed
        - event: Revoked(indexed uint256,indexed address)
          handler: handleRevoked
        - event: Executed(indexed uint256,indexed address)
          handler: handleExecuted
        - event: Cancelled(indexed uint256,indexed address)
          handler: handleCancelled
      file: ./src/peripheral/vault.ts

templates:
  - kind: ethereum
    name: MemeToken
    network: bsc
    source:
      abi: MemeToken
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.7
      language: wasm/assemblyscript
      entities:
        - Holder
        - Token
      abis:
        - name: MemeToken
          file: ./abis/MemeToken.json
      eventHandlers:
        - event: Transfer(indexed address,indexed address,uint256)
          handler: handleTransfer
      file: ./src/memeToken.ts
