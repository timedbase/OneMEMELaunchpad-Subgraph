specVersion: 1.0.0
description: OneMEME Launchpad subgraph — tracks token launches, bonding-curve trades, migrations, and creator vesting on Ethereum
repository: https://github.com/timedbase/OneMEMELaunchpad-Subgraph
features:
  - ipfsOnEthereumContracts

indexerHints:
  prune: auto

schema:
  file: ./schema.graphql

dataSources:
  - kind: ethereum
    name: Launchpad
    network: mainnet
    source:
      address: "0xc4225f38832d0956aab8318f147173bf2fa18d98"
      abi: Launchpad
      startBlock: 25410744
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.7
      language: wasm/assemblyscript
      entities:
        - Factory
        - Token
        - Trade
        - Migration
        - TimelockAction
        - TokenSnapshot
        - TokenPeriodStats
        - LaunchpadPair
      abis:
        - name: Launchpad
          file: ./abis/Launchpad.json
        - name: Token
          file: ./abis/Token.json
        - name: PancakePair
          file: ./abis/PancakePair.json
      eventHandlers:
        - event: TokenCreated(indexed address,indexed address,uint256,uint256,uint256,bool,uint256)
          handler: handleTokenCreated
        - event: TokenRegistered(indexed address,indexed address,uint256,uint256,uint256)
          handler: handleTokenRegistered
        - event: TokenBought(indexed address,indexed address,uint256,uint256,uint256,uint256)
          handler: handleTokenBought
        - event: TokenSold(indexed address,indexed address,uint256,uint256,uint256)
          handler: handleTokenSold
        - event: TokenMigrated(indexed address,indexed address,uint256,uint256)
          handler: handleTokenMigrated
        - event: CreationFeeUpdated(uint256,uint256)
          handler: handleCreationFeeUpdated
        - event: FeesUpdated(uint256,uint256)
          handler: handleFeesUpdated
        - event: FeeRecipientUpdated(address)
          handler: handleFeeRecipientUpdated
        - event: CharityWalletUpdated(address)
          handler: handleCharityWalletUpdated
        - event: CreatorVaultUpdated(indexed address,indexed address)
          handler: handleCreatorVaultUpdated
        - event: RouterUpdated(indexed address,indexed address)
          handler: handleRouterUpdated
        - event: OwnershipTransferred(indexed address,indexed address)
          handler: handleOwnershipTransferred
        - event: OwnershipTransferProposed(indexed address,indexed address)
          handler: handleOwnershipTransferProposed
        - event: TimelockQueued(indexed bytes32,uint256)
          handler: handleTimelockQueued
        - event: TimelockExecuted(indexed bytes32)
          handler: handleTimelockExecuted
        - event: TimelockCancelled(indexed bytes32)
          handler: handleTimelockCancelled
        - event: EmergencyMigrated(indexed address,indexed address,uint256,uint256)
          handler: handleEmergencyMigrated
        - event: MigrationFailed(indexed address)
          handler: handleMigrationFailed
        - event: AllocationBoundsUpdated(uint256,uint256,uint256)
          handler: handleAllocationBoundsUpdated
        - event: SupplyBoundsUpdated(uint256,uint256)
          handler: handleSupplyBoundsUpdated
        - event: ImplUpdated(string,indexed address,indexed address)
          handler: handleImplUpdated
      file: ./src/launchpad.ts

  - kind: ethereum
    name: CreatorVault
    network: mainnet
    source:
      address: "0x69032d7bd75564b918a1a8e2e1917db1a911f4bd"
      abi: CreatorVault
      startBlock: 25410743
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.7
      language: wasm/assemblyscript
      entities:
        - VestingSchedule
        - VestingClaim
        - CreatorVaultPosition
        - CreatorVaultFeeClaim
        - CreatorVaultState
        - LaunchpadPool
      abis:
        - name: CreatorVault
          file: ./abis/CreatorVault.json
        - name: UniswapV3Pool
          file: ./abis/UniswapV3Pool.json
      eventHandlers:
        - event: VestingAdded(indexed address,indexed address,uint256,uint256)
          handler: handleVestingAdded
        - event: Claimed(indexed address,indexed address,uint256)
          handler: handleClaimed
        - event: VestingVoided(indexed address,indexed address,uint256)
          handler: handleVestingVoided
        - event: PositionRegistered(indexed address,indexed uint256,address,address,address)
          handler: handlePositionRegistered
        - event: FeesClaimed(indexed address,indexed address,uint256,uint256,uint256,uint256,uint256,uint256)
          handler: handleFeesClaimed
        - event: PlatformWalletSet(indexed address)
          handler: handlePlatformWalletSet
        - event: CharityWalletSet(indexed address)
          handler: handleCharityWalletSet
        - event: FeeBpsUpdated(uint256,uint256,uint256)
          handler: handleFeeBpsUpdated
        - event: OwnershipTransferred(indexed address,indexed address)
          handler: handleOwnershipTransferred
        - event: LaunchManagerUpdated(indexed address,indexed address)
          handler: handleLaunchManagerUpdated
      file: ./src/creatorVault.ts

  # USDC/WETH Uniswap V2 pair — the Launchpad contract's own usdQuotePair (read live via
  # usdcToken()/usdQuotePair() on the deployed Launchpad; this is the canonical, highly-liquid
  # USDC/WETH pool). USDC (0xa0b8699...) is token0.
  # startBlock matches OneCoinLocker below, the earliest startBlock among this chain's data sources.
  - kind: ethereum
    name: NativeUsdOracle
    network: mainnet
    source:
      address: "0xb4e16d0168e52d35cacd2c6185b44281ec28c9dc"
      abi: PancakePair
      startBlock: 25182671
    context:
      usdcToken:
        type: Bytes
        data: "0xa0b86991c6218b36c1d19d4a2e9eb0ce3606eb48"
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.7
      language: wasm/assemblyscript
      entities:
        - NativeUsdPrice
        - NativeUsdPriceSnapshot
      abis:
        - name: PancakePair
          file: ./abis/PancakePair.json
        - name: Token
          file: ./abis/Token.json
      eventHandlers:
        - event: Sync(uint112,uint112)
          handler: handleSync
      file: ./src/usdOracle.ts

  - kind: ethereum
    name: OneCoinLocker
    network: mainnet
    source:
      address: "0xD7F53605d58057D8f96337dF606638c3e79B9867"
      abi: OneCoinLocker
      startBlock: 25182671
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.7
      language: wasm/assemblyscript
      entities:
        - Locker
        - Lock
        - LockWithdrawal
        - LockTransfer
        - LockActivity
      abis:
        - name: OneCoinLocker
          file: ./abis/OneCoinLocker.json
      eventHandlers:
        - event: LockCreated(indexed uint256,indexed address,indexed address,uint256,uint256,uint256,uint8,bool)
          handler: handleLockCreated
        - event: LockEdited(indexed uint256,uint256,uint256)
          handler: handleLockEdited
        - event: LockDescriptionChanged(indexed uint256,string)
          handler: handleLockDescriptionChanged
        - event: Withdrawn(indexed uint256,indexed address,uint256,uint256)
          handler: handleWithdrawn
        - event: LockExtended(indexed uint256,uint256)
          handler: handleLockExtended
        - event: LockTransferred(indexed uint256,indexed address,indexed address)
          handler: handleLockTransferred
        - event: LockRenounced(indexed uint256)
          handler: handleLockRenounced
        - event: FeeUpdated(uint256)
          handler: handleFeeUpdated
        - event: FeesCollected(indexed address,uint256)
          handler: handleFeesCollected
      file: ./src/locker.ts

  - kind: ethereum
    name: SparkLauncher
    network: mainnet
    source:
      address: "0x3f15d4729535e76421f3085b6392488489b33b02"
      abi: SparkLauncher
      startBlock: 25383747
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.7
      language: wasm/assemblyscript
      entities:
        - SparkLaunchedToken
        - SparkDex
        - SparkQuoteToken
        - SparkLauncherState
        - SparkPool
        - SparkTokenSnapshot
        - SparkTokenPeriodStats
      abis:
        - name: SparkLauncher
          file: ./abis/SparkLauncher.json
        - name: SparkToken
          file: ./abis/SparkToken.json
        - name: UniswapV3Pool
          file: ./abis/UniswapV3Pool.json
      eventHandlers:
        - event: TokenLaunched(indexed address,indexed address,indexed address,address,address,address,uint256)
          handler: handleTokenLaunched
        - event: DexAdded(indexed address,address,address)
          handler: handleDexAdded
        - event: DexDisabled(indexed address)
          handler: handleDexDisabled
        - event: QuoteTokenAdded(indexed address,uint256,uint24)
          handler: handleQuoteTokenAdded
        - event: QuoteTokenDisabled(indexed address)
          handler: handleQuoteTokenDisabled
        - event: LaunchFeeSet(uint256)
          handler: handleLaunchFeeSet
        - event: LaunchFeeWalletSet(indexed address)
          handler: handleLaunchFeeWalletSet
        - event: MarketCapRefSet(indexed address,uint256)
          handler: handleMarketCapRefSet
        - event: ETHRescued(indexed address,uint256)
          handler: handleETHRescued
        - event: ERC20Rescued(indexed address,indexed address,uint256)
          handler: handleERC20Rescued
      file: ./src/sparkLauncher.ts

  - kind: ethereum
    name: SparkLocker
    network: mainnet
    source:
      address: "0xb5CAC5eDf15729e40D54787A6C0Dc880C1D65313"
      abi: SparkLocker
      startBlock: 25383702
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.7
      language: wasm/assemblyscript
      entities:
        - SparkLockerState
        - SparkLaunchedToken
        - SparkFeeClaim
      abis:
        - name: SparkLocker
          file: ./abis/SparkLocker.json
      eventHandlers:
        - event: PositionRegistered(indexed address,indexed uint256,address,address,address)
          handler: handlePositionRegistered
        - event: FeesClaimed(indexed address,indexed address,uint256,uint256,uint256,uint256,uint256,uint256)
          handler: handleFeesClaimed
        - event: FeeBpsUpdated(uint256,uint256,uint256)
          handler: handleFeeBpsUpdated
        - event: PlatformWalletSet(indexed address)
          handler: handlePlatformWalletSet
        - event: CharityWalletSet(indexed address)
          handler: handleCharityWalletSet
        - event: LauncherSet(indexed address)
          handler: handleLauncherSet
        - event: OwnershipTransferred(indexed address,indexed address)
          handler: handleOwnershipTransferred
      file: ./src/sparkLocker.ts

templates:
  - kind: ethereum
    name: MemeToken
    network: mainnet
    source:
      abi: MemeToken
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.7
      language: wasm/assemblyscript
      entities:
        - Holder
        - Token
      abis:
        - name: MemeToken
          file: ./abis/MemeToken.json
      eventHandlers:
        - event: Transfer(indexed address,indexed address,uint256)
          handler: handleTransfer
      file: ./src/memeToken.ts
  - kind: ethereum
    name: UniswapV3Pool
    network: mainnet
    source:
      abi: UniswapV3Pool
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.7
      language: wasm/assemblyscript
      entities:
        - SparkPool
        - SparkLaunchedToken
        - SparkTrade
        - SparkTokenSnapshot
        - SparkTokenPeriodStats
      abis:
        - name: UniswapV3Pool
          file: ./abis/UniswapV3Pool.json
      eventHandlers:
        - event: Swap(indexed address,indexed address,int256,int256,uint160,uint128,int24)
          handler: handleSwap
      file: ./src/sparkPool.ts
  - kind: ethereum
    name: LaunchpadV3Pool
    network: mainnet
    source:
      abi: UniswapV3Pool
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.7
      language: wasm/assemblyscript
      entities:
        - LaunchpadPool
        - Token
        - TokenSnapshot
        - TokenPeriodStats
        - DexTrade
      abis:
        - name: UniswapV3Pool
          file: ./abis/UniswapV3Pool.json
      eventHandlers:
        - event: Swap(indexed address,indexed address,int256,int256,uint160,uint128,int24)
          handler: handleSwap
      file: ./src/launchpadPool.ts
  - kind: ethereum
    name: PancakePair
    network: mainnet
    source:
      abi: PancakePair
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.7
      language: wasm/assemblyscript
      entities:
        - LaunchpadPair
        - Token
        - TokenSnapshot
        - TokenPeriodStats
        - DexTrade
      abis:
        - name: PancakePair
          file: ./abis/PancakePair.json
      eventHandlers:
        - event: Swap(indexed address,uint256,uint256,uint256,uint256,indexed address)
          handler: handleSwap
      file: ./src/launchpadPair.ts
  - kind: ethereum
    name: SparkToken
    network: mainnet
    source:
      abi: SparkToken
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.7
      language: wasm/assemblyscript
      entities:
        - SparkHolder
      abis:
        - name: SparkToken
          file: ./abis/SparkToken.json
      eventHandlers:
        - event: Transfer(indexed address,indexed address,uint256)
          handler: handleTransfer
      file: ./src/sparkToken.ts
